<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个体户 - 全球化小店</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Noto+Sans+SC:wght@400;500;700;900&family=Fira+Code:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .canvas {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 2rem;
        }
        .canvas h2 {
            font-size: 3rem;
            text-align: center;
        }
        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: var(--radius-xl);
            border: 2px solid rgba(236, 72, 153, 0.4);
        }
        .card-title {
            font-size: 2rem;
            color: var(--pro-pink);
            margin-bottom: 2rem;
            text-align: center;
        }
        .case-info {
            background: rgba(251, 191, 36, 0.1);
            padding: 1.5rem;
            border-radius: var(--radius-md);
            margin-bottom: 2rem;
            text-align: center;
            border: 1px solid rgba(251, 191, 36, 0.3);
        }
        .case-info p {
            margin: 0.5rem 0;
            font-size: 1.15rem;
        }
        .tools-badge {
            display: inline-block;
            background: rgba(6, 182, 212, 0.2);
            color: var(--pro-cyan);
            padding: 0.4rem 1rem;
            border-radius: var(--radius-sm);
            font-weight: 600;
            margin: 0 0.3rem;
        }
        .benefits-section {
            margin-top: 1.5rem;
        }
        .section-label {
            text-align: center;
            font-size: 1.3rem;
            color: var(--pro-orange);
            font-weight: 600;
            margin-bottom: 1.5rem;
        }
        .benefits-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .benefit-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            padding: 1.2rem 1.5rem;
            border-radius: var(--radius-md);
            font-size: 1.05rem;
        }
        .benefit-icon {
            font-size: 1.5rem;
            color: var(--pro-green);
        }
    </style>
</head>
<body>
    <div class="canvas">
        <h2><i class="fa-solid fa-user" style="color: var(--pro-pink); margin-right: 1rem;"></i>个体户</h2>

        <div class="main-card">
            <div class="card-title">场景二：全球化小店（Dropshipping / 独立站）</div>

            <div class="case-info">
                <p><strong>真实案例：</strong>某个人站长利用 <span class="tools-badge">Make.com</span> + <span class="tools-badge">AI</span></p>
                <p>自动化处理来自加州、德国、澳大利亚的订单</p>
            </div>

            <div class="benefits-section">
                <div class="section-label">提效点</div>
                <div class="benefits-list">
                    <div class="benefit-item">
                        <div class="benefit-icon"><i class="fa-solid fa-box"></i></div>
                        <div>自动抓取供应商库存</div>
                    </div>
                    <div class="benefit-item">
                        <div class="benefit-icon"><i class="fa-solid fa-dollar-sign"></i></div>
                        <div>自动调整不同币种定价</div>
                    </div>
                    <div class="benefit-item">
                        <div class="benefit-icon"><i class="fa-solid fa-envelope"></i></div>
                        <div>自动发送个性化物流追踪邮件</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="progress-bar-container">
        <div class="progress-bar" style="width: 81.81%;"></div>
    </div>

    <div class="controls-container">
        <a class="nav-btn " href="09-solo-creator.html"><i class="fa-solid fa-chevron-left"></i></a>
        <div class="slide-counter">10 / 12</div>
        <a class="nav-btn " href="11-summary.html"><i class="fa-solid fa-chevron-right"></i></a>
    </div>

    <script src="scale.js"></script>
</body>
</html>
