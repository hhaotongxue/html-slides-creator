    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Noto+Sans+SC:wght@400;500;700;900&family=Fira+Code:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* 关键：确保内容不溢出 */
        .canvas {
            display: flex;
            flex-direction: column;
            padding: 3rem 5rem !important; /* 减小上下 padding */
        }
        .canvas h1 {
            font-size: 2.5rem; /* 减小标题 */
            margin-bottom: 0.3rem;
        }
        .subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);

        }
        .featured-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--pro-yellow), var(--pro-orange));
            color: white;
            padding: 0.4rem 1.2rem;
            border-radius: var(--radius-full);
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);

            border-radius: var(--radius-xl);
            border: 2px solid rgba(16, 185, 129, 0.4);

        .card-title {

            margin-bottom: 1rem;
        }
        .case-label {
            display: inline-block;
            background: rgba(6, 182, 212, 0.2);

            font-size: 0.85rem;

            padding: 1.2rem;
            border-radius: var(--radius-md);
            margin: 1rem 0;
            border: 1px solid rgba(251, 191, 36, 0.3);
        }
        .data-section p {
            margin: 0.4rem 0;
            font-size: 1rem;
            line-height: 1.5;
        }
        .highlight-stat {
            color: var(--pro-orange);
            font-weight: 700;
            font-size: 1.1rem;
        }
        .tools-box {
            background: rgba(6, 182, 212, 0.1);
            padding: 1.2rem;
            border-radius: var(--radius-md);

            border: 1px solid rgba(6, 182, 212, 0.3);

        .tools-box strong {

    <div class="progress-bar-container">

    </div>

    <div class="controls-container">
