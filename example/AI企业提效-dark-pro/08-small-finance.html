<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小型企业 - 财务预测</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Noto+Sans+SC:wght@400;500;700;900&family=Fira+Code:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .canvas {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 2rem;
        }
        .canvas h2 {
            font-size: 3rem;
            text-align: center;
        }
        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: var(--radius-xl);
            border: 2px solid rgba(16, 185, 129, 0.4);
        }
        .card-title {
            font-size: 2rem;
            color: var(--pro-green);
            margin-bottom: 2rem;
            text-align: center;
        }
        .stat-highlight {
            background: rgba(247, 147, 26, 0.1);
            padding: 2rem;
            border-radius: var(--radius-md);
            text-align: center;
            margin-bottom: 2rem;
            border: 1px solid rgba(247, 147, 26, 0.3);
        }
        .stat-highlight p {
            font-size: 1.3rem;
            margin: 0;
            line-height: 1.7;
        }
        .big-number {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--pro-orange);
            margin: 0 0.3rem;
        }
        .benefits-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .benefit-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(6, 182, 212, 0.1);
            border: 1px solid rgba(6, 182, 212, 0.3);
            padding: 1.2rem 1.5rem;
            border-radius: var(--radius-md);
            font-size: 1.1rem;
        }
        .benefit-icon {
            font-size: 1.5rem;
            color: var(--pro-cyan);
        }
    </style>
</head>
<body>
    <div class="canvas">
        <h2><i class="fa-solid fa-store" style="color: var(--pro-green); margin-right: 1rem;"></i>小型企业</h2>

        <div class="main-card">
            <div class="card-title">场景二：财务与现金流预测</div>

            <div class="stat-highlight">
                <p><strong>数据支撑：</strong><span class="big-number">66%</span> 的小型企业报告通过 AI 每月节省 <span class="big-number">$500-$2,000</span></p>
            </div>

            <div style="text-align: center; margin-bottom: 1.5rem; font-size: 1.2rem; color: var(--pro-green); font-weight: 600;">
                提效点
            </div>

            <div class="benefits-list">
                <div class="benefit-item">
                    <div class="benefit-icon"><i class="fa-solid fa-check-circle"></i></div>
                    <div>自动分类费用单据（准确率 <strong style="color: var(--pro-cyan);">95%+</strong>）</div>
                </div>
                <div class="benefit-item">
                    <div class="benefit-icon"><i class="fa-solid fa-check-circle"></i></div>
                    <div>自动生成税务预测</div>
                </div>
                <div class="benefit-item">
                    <div class="benefit-icon"><i class="fa-solid fa-check-circle"></i></div>
                    <div>避免滞纳金和人工核算错误</div>
                </div>
            </div>
        </div>
    </div>

    <div class="progress-bar-container">
        <div class="progress-bar" style="width: 63.63%;"></div>
    </div>

    <div class="controls-container">
        <a class="nav-btn " href="07-small-ecommerce.html"><i class="fa-solid fa-chevron-left"></i></a>
        <div class="slide-counter">8 / 12</div>
        <a class="nav-btn " href="09-solo-creator.html"><i class="fa-solid fa-chevron-right"></i></a>
    </div>

    <script src="scale.js"></script>
</body>
</html>
