<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中型公司 - 营销与质量控制</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Noto+Sans+SC:wght@400;500;700;900&family=Fira+Code:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .canvas h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            font-size: 1.3rem;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
        }
        .scenario-section {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: var(--radius-lg);
            border: 2px solid;
            margin-bottom: 1.5rem;
        }
        .scenario-section:nth-child(3) {
            border-color: rgba(6, 182, 212, 0.4);
        }
        .scenario-section:nth-child(4) {
            border-color: rgba(16, 185, 129, 0.4);
        }
        .scenario-section h3 {
            font-size: 1.6rem;
            margin-bottom: 1.2rem;
        }
        .scenario-section:nth-child(3) h3 {
            color: var(--pro-cyan);
        }
        .scenario-section:nth-child(4) h3 {
            color: var(--pro-green);
        }
        .info-row {
            display: flex;
            gap: 2rem;
            margin-bottom: 1rem;
        }
        .info-item {
            flex: 1;
        }
        .label {
            display: inline-block;
            background: rgba(251, 191, 36, 0.2);
            color: var(--pro-yellow);
            padding: 0.3rem 0.8rem;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .data-text {
            background: rgba(247, 147, 26, 0.1);
            padding: 1rem;
            border-radius: var(--radius-sm);
            margin: 0.8rem 0;
            font-size: 1.05rem;
            line-height: 1.6;
            border: 1px solid rgba(247, 147, 26, 0.3);
        }
        .highlight-num {
            color: var(--pro-orange);
            font-weight: 700;
            font-size: 1.15rem;
        }
    </style>
</head>
<body>
    <div class="canvas">
        <h1><i class="fa-solid fa-chart-line" style="color: var(--pro-cyan); margin-right: 1rem;"></i>中型公司：营销自动化与业务增长</h1>
        <p class="subtitle">通常面临人力瓶颈，AI 成为"数字劳动力"的补充</p>

        <div class="scenario-section">
            <h3>场景一：营销转化与内容生产</h3>

            <div class="info-row">
                <div class="info-item">
                    <div class="label">真实案例</div>
                    <p>某 B2B 金融服务公司利用 AI 生成个性化营销邮件</p>
                </div>
            </div>

            <div class="data-text">
                <strong>落地数据：</strong><span class="highlight-num">91%</span> 的使用 AI 的中型企业报告了收入增长。2025年数据显示，AI 驱动的内容营销使营销活动执行速度提升了 <span class="highlight-num">85%</span>。
            </div>
        </div>

        <div class="scenario-section">
            <h3>场景二：质量控制（智能制造方向）</h3>

            <div class="data-text">
                <strong>落地数据：</strong>在制造领域的中小型企业中，AI 视觉检测的缺陷识别准确率达到 <span class="highlight-num">98%-99.5%</span>，生产调度效率提升 <span class="highlight-num">80%</span> 以上。
            </div>
        </div>
    </div>

    <div class="progress-bar-container">
        <div class="progress-bar" style="width: 36.36%;"></div>
    </div>

    <div class="controls-container">
        <a class="nav-btn " href="04-enterprise-supply.html"><i class="fa-solid fa-chevron-left"></i></a>
        <div class="slide-counter">5 / 12</div>
        <a class="nav-btn " href="06-midmarket-hr.html"><i class="fa-solid fa-chevron-right"></i></a>
    </div>

    <script src="scale.js"></script>
</body>
</html>
