<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code 通知提醒 - 方案一</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&family=Noto+Sans+SC:wght@400;500;700;900&family=Fira+Code:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .canvas { display: flex; flex-direction: column; justify-content: center; }
        .badge {
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--dopa-blue); color: var(--dopa-text-main);
            padding: 0.4rem 1.2rem; border-radius: 50px; font-weight: 700; font-size: 0.9rem;
            margin-bottom: 1rem; width: fit-content;
        }
        .canvas h2 { font-size: 2.8rem; margin-bottom: 0.5rem; }
        .canvas > .subtitle { font-size: 1.3rem; margin-bottom: 2rem; }
        .code-block { margin-bottom: 2rem; font-size: 0.9rem; }
        .features { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .feat-card {
            padding: 1.5rem; border-radius: 16px; background: #fff;
            border: 2px solid var(--feat-color); box-shadow: var(--soft-shadow);
        }
        .feat-card h4 { font-size: 1.1rem; margin-bottom: 0.5rem; color: var(--feat-color); display: flex; align-items: center; gap: 8px; }
        .feat-card p { font-size: 0.95rem; margin: 0; }
        .feat-pro { --feat-color: var(--dopa-mint); }
        .feat-con { --feat-color: var(--dopa-pink); }
    </style>
</head>
<body>

<div class="canvas">
    <div class="badge"><i class="fa-solid fa-1"></i> 零依赖</div>
    <h2><i class="fa-solid fa-message gradient-text-mint-blue"></i> osascript display notification</h2>
    <p class="subtitle">系统原生通知 — 一行搞定，macOS 自带</p>

    <div class="code-block">osascript -e 'display notification "Claude Code needs your attention" with title "Claude Code"'</div>

    <div class="features">
        <div class="feat-card feat-pro">
            <h4><i class="fa-solid fa-check"></i> 优点</h4>
            <p>零依赖，macOS 自带<br>配置最简单，一行搞定</p>
        </div>
        <div class="feat-card feat-con">
            <h4><i class="fa-solid fa-xmark"></i> 缺点</h4>
            <p>没有声音，容易错过<br>通知几秒就消失<br>图标是 Script Editor 默认图标</p>
        </div>
    </div>
</div>

<div class="progress-bar-container">
    <div class="progress-bar" style="width: 18%;"></div>
</div>

<div class="controls-container">
    <a class="nav-btn" href="02-hooks-intro.html"><i class="fa-solid fa-chevron-left"></i></a>
    <div class="slide-counter">3 / 11</div>
    <a class="nav-btn" href="04-plan2.html"><i class="fa-solid fa-chevron-right"></i></a>
</div>

<script src="scale.js"></script>
</body>
</html>
