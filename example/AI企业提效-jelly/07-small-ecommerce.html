<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小型企业：跨境电商</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Noto+Sans+SC:wght@400;500;700;900&family=Fira+Code:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .section-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2.5rem;
        }
        .section-icon { font-size: 2.5rem; }
        .section-title { font-size: 2.8rem; font-weight: 900; }
        .recommended-badge {
            display: inline-block;
            background: var(--jelly-pink);
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 20px;
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 2rem;
            box-shadow: 0 0 20px var(--jelly-pink);
        }
        .content-layout {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }
        .stat-banner {
            background: linear-gradient(135deg, rgba(236, 72, 153, 0.2), rgba(6, 182, 212, 0.2));
            backdrop-filter: blur(12px);
            padding: 2rem;
            border-radius: 20px;
            border: 2px solid var(--jelly-pink);
            text-align: center;
            box-shadow: 0 0 30px rgba(236, 72, 153, 0.3);
        }
        .stat-text {
            font-size: 1.3rem;
            color: var(--text-light);
            margin-bottom: 1rem;
        }
        .stat-big {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--jelly-cyan);
            text-shadow: 0 0 20px var(--jelly-cyan);
        }
        .benefits-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        .benefit-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            padding: 1.8rem;
            border-radius: 16px;
            border: 1px solid var(--border-color);
        }
        .benefit-icon {
            font-size: 2rem;
            color: var(--jelly-cyan);
            margin-bottom: 1rem;
        }
        .benefit-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.8rem;
        }
        .benefit-desc {
            font-size: 1rem;
            color: var(--text-dim);
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="canvas">
        <div class="section-header">
            <div class="section-icon"><i class="fa-solid fa-store"></i></div>
            <h1 class="section-title">小型企业：跨境电商</h1>
        </div>

        <div class="recommended-badge"><i class="fa-solid fa-star"></i> 核心推荐场景</div>

        <div class="content-layout">
            <div class="stat-banner">
                <div class="stat-text">每人每月平均节省时间</div>
                <div class="stat-big">20+ 小时</div>
            </div>

            <div class="benefits-grid">
                <div class="benefit-card">
                    <div class="benefit-icon"><i class="fa-solid fa-language"></i></div>
                    <div class="benefit-title">多语言客服</div>
                    <div class="benefit-desc">AI 实时翻译与文化本地化</div>
                </div>
                <div class="benefit-card">
                    <div class="benefit-icon"><i class="fa-solid fa-file-invoice"></i></div>
                    <div class="benefit-title">报关单据处理</div>
                    <div class="benefit-desc">自动化合规检查</div>
                </div>
                <div class="benefit-card">
                    <div class="benefit-icon"><i class="fa-solid fa-tags"></i></div>
                    <div class="benefit-title">Listing 优化</div>
                    <div class="benefit-desc">AI 生成产品描述</div>
                </div>
                <div class="benefit-card">
                    <div class="benefit-icon"><i class="fa-solid fa-globe"></i></div>
                    <div class="benefit-title">全球化运营</div>
                    <div class="benefit-desc">低成本拓展国际市场</div>
                </div>
            </div>
        </div>
    </div>

    <div class="progress-bar-container">
        <div class="progress-bar" style="width: 54.54%;"></div>
    </div>

    <div class="controls-container">
        <a class="nav-btn" href="06-midmarket-quality.html"><i class="fa-solid fa-chevron-left"></i></a>
        <div class="slide-counter">07 / 12</div>
        <a class="nav-btn" href="08-small-finance.html"><i class="fa-solid fa-chevron-right"></i></a>
    </div>

    <script src="scale.js"></script>
</body>
</html>
