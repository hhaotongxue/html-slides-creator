<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小型企业：财务优化</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Noto+Sans+SC:wght@400;500;700;900&family=Fira+Code:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .section-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2.5rem;
        }
        .section-icon { font-size: 2.5rem; }
        .section-title { font-size: 2.8rem; font-weight: 900; }
        .main-stat {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(168, 85, 247, 0.2));
            backdrop-filter: blur(12px);
            padding: 3rem;
            border-radius: 24px;
            border: 2px solid var(--jelly-blue);
            text-align: center;
            margin-bottom: 2rem;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.3);
        }
        .stat-label {
            font-size: 1.3rem;
            color: var(--text-dim);
            margin-bottom: 1rem;
        }
        .stat-value {
            font-size: 4.5rem;
            font-weight: 900;
            background: var(--holographic-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 0.8rem;
        }
        .stat-context {
            font-size: 1.1rem;
            color: var(--text-light);
        }
        .features-list {
            display: flex;
            gap: 1.5rem;
        }
        .feature-item {
            flex: 1;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            padding: 1.8rem;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            text-align: center;
        }
        .feature-icon {
            font-size: 2.5rem;
            color: var(--jelly-purple);
            margin-bottom: 1rem;
        }
        .feature-text {
            font-size: 1.1rem;
            color: var(--text-light);
            font-weight: 600;
        }
        .accuracy-badge {
            display: inline-block;
            background: var(--jelly-cyan);
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 15px;
            font-size: 0.9rem;
            font-weight: 700;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="canvas">
        <div class="section-header">
            <div class="section-icon"><i class="fa-solid fa-coins"></i></div>
            <h1 class="section-title">小型企业：财务优化</h1>
        </div>

        <div class="main-stat">
            <div class="stat-label">66% 的小型企业报告</div>
            <div class="stat-value">$500-$2,000</div>
            <div class="stat-context">每月通过 AI 节省成本</div>
        </div>

        <div class="features-list">
            <div class="feature-item">
                <div class="feature-icon"><i class="fa-solid fa-receipt"></i></div>
                <div class="feature-text">自动分类费用单据</div>
                <div class="accuracy-badge">准确率 95%+</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon"><i class="fa-solid fa-chart-pie"></i></div>
                <div class="feature-text">自动生成税务预测</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon"><i class="fa-solid fa-shield-halved"></i></div>
                <div class="feature-text">避免滞纳金和<br>人工核算错误</div>
            </div>
        </div>
    </div>

    <div class="progress-bar-container">
        <div class="progress-bar" style="width: 63.63%;"></div>
    </div>

    <div class="controls-container">
        <a class="nav-btn" href="07-small-ecommerce.html"><i class="fa-solid fa-chevron-left"></i></a>
        <div class="slide-counter">08 / 12</div>
        <a class="nav-btn" href="09-solo-creator.html"><i class="fa-solid fa-chevron-right"></i></a>
    </div>

    <script src="scale.js"></script>
</body>
</html>
