<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个体户：全球化小店</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Noto+Sans+SC:wght@400;500;700;900&family=Fira+Code:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .section-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2.5rem;
        }
        .section-icon { font-size: 2.5rem; }
        .section-title { font-size: 2.5rem; font-weight: 900; }
        .scenario-tag {
            display: inline-block;
            background: var(--jelly-purple);
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 20px;
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 2rem;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.5);
        }
        .automation-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1.5rem;
        }
        .auto-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            padding: 2rem 1.5rem;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            text-align: center;
            transition: all 0.3s;
        }
        .auto-card:hover {
            transform: translateY(-5px);
            border-color: var(--jelly-cyan);
            box-shadow: 0 10px 30px rgba(6, 182, 212, 0.3);
        }
        .auto-icon {
            font-size: 3rem;
            color: var(--jelly-cyan);
            margin-bottom: 1rem;
        }
        .auto-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.8rem;
        }
        .auto-desc {
            font-size: 1rem;
            color: var(--text-dim);
            line-height: 1.6;
        }
        .tool-mention {
            text-align: center;
            margin-top: 2rem;
            padding: 1.5rem;
            background: rgba(6, 182, 212, 0.1);
            border-radius: 16px;
            border: 1px solid rgba(6, 182, 212, 0.3);
        }
        .tool-text {
            font-size: 1.2rem;
            color: var(--text-light);
        }
        .tool-name {
            color: var(--jelly-cyan);
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="canvas">
        <div class="section-header">
            <div class="section-icon"><i class="fa-solid fa-globe"></i></div>
            <h1 class="section-title">个体户：全球化小店</h1>
        </div>

        <div class="scenario-tag">Dropshipping / 独立站</div>

        <div class="automation-grid">
            <div class="auto-card">
                <div class="auto-icon"><i class="fa-solid fa-boxes-stacked"></i></div>
                <div class="auto-title">库存管理</div>
                <div class="auto-desc">自动抓取供应商库存</div>
            </div>
            <div class="auto-card">
                <div class="auto-icon"><i class="fa-solid fa-dollar-sign"></i></div>
                <div class="auto-title">动态定价</div>
                <div class="auto-desc">自动调整不同币种定价</div>
            </div>
            <div class="auto-card">
                <div class="auto-icon"><i class="fa-solid fa-truck"></i></div>
                <div class="auto-title">物流追踪</div>
                <div class="auto-desc">自动发送个性化追踪邮件</div>
            </div>
        </div>

        <div class="tool-mention">
            <div class="tool-text">
                <i class="fa-solid fa-wrench"></i> 利用 <span class="tool-name">Make.com + AI</span> 自动化处理来自全球的订单
            </div>
        </div>
    </div>

    <div class="progress-bar-container">
        <div class="progress-bar" style="width: 81.81%;"></div>
    </div>

    <div class="controls-container">
        <a class="nav-btn" href="09-solo-creator.html"><i class="fa-solid fa-chevron-left"></i></a>
        <div class="slide-counter">10 / 12</div>
        <a class="nav-btn" href="11-comparison.html"><i class="fa-solid fa-chevron-right"></i></a>
    </div>

    <script src="scale.js"></script>
</body>
</html>
